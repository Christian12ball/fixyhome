# Nixpacks configuration for Railway deployment

[phases.setup]
nixPkgs = ["nodejs_20", "postgresql", "maven"]

[phases.build]
cmds = [
  "cd backend && mvn clean package -DskipTests",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "java -jar backend/target/*.jar"

[variables]
NODE_ENV = "production"
PORT = "8080"
