# Configuration du serveur (port alternatif)
server.port=8081
server.servlet.context-path=/api

# Configuration de la base de données (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/fixyhome?stringtype=unspecified
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.query.substitutions=true=1, false=0

# Configuration JWT
jwt.secret=PqRGm5Kp1gw031LbUAuFc9CeDIMyHbOyuwOKNIgp9s0wOLxNiLEHyEisk+JReYNfFv9xCcb01BJE4TxxBPqVHw==
jwt.expiration=86400000

# Configuration CORS
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.fixyhome=DEBUG
logging.level.org.springframework.security=DEBUG
