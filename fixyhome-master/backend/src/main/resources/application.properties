# =============================================
# CONFIGURATION FIXYHOME - DÉPLOIEMENT RAILWAY
# =============================================

spring.application.name=fixyhome-backend

# Configuration serveur
server.port=${PORT:8080}
server.address=0.0.0.0

# =============================================
# BASE DE DONNÉES POSTGRESQL
# =============================================
# Railway fournit automatiquement DATABASE_URL, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:fixyhome}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration UTF-8 pour PostgreSQL
spring.datasource.connectionProperties=useUnicode=true;characterEncoding=UTF-8;characterSetResults=UTF-8

# =============================================
# CONFIGURATION JPA/HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.query.substitutions=true=1, false=0

# =============================================
# CONFIGURATION CORS
# =============================================
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,${RAILWAY_PUBLIC_DOMAIN}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# =============================================
# CONFIGURATION JWT
# =============================================
jwt.secret=${JWT_SECRET:PqRGm5Kp1gw031LbUAuFc9CeDIMyHbOyuwOKNIgp9s0wOLxNiLEHyEisk+JReYNfFv9xCcb01BJE4TxxBPqVHw==}
jwt.expiration=${JWT_EXPIRATION_IN_MS:86400000}

# =============================================
# LOGGING CONFIGURATION
# =============================================
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http=DEBUG
logging.level.com.fixyhome=DEBUG
logging.level.org.springframework.security=DEBUG

# =============================================
# ACTUATOR CONFIGURATION
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.probes.enabled=true
